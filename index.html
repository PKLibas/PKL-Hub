<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Business Tools</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: white; font-size: 28px; }
        .logo p { color: #888; font-size: 14px; margin-top: 5px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; text-decoration: none; display: block; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card-icon { font-size: 32px; margin-bottom: 10px; }
        .card-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 5px; }
        .card-desc { font-size: 13px; color: #666; }
        .footer { text-align: center; color: #555; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>👗 Dress Business</h1>
            <p>Management Tools</p>
        </div>
        <a href="moderator.html" class="card">
            <div class="card-icon">👤</div>
            <div class="card-title">Moderator Panel</div>
            <div class="card-desc">Calculator + Reverse Image Search</div>
        </a>
        <a href="reseller.html" class="card">
            <div class="card-icon">💰</div>
            <div class="card-title">Reseller Calculator</div>
            <div class="card-desc">Price calculator for resellers</div>
        </a>
        <a href="orders.html" class="card">
            <div class="card-icon">📦</div>
            <div class="card-title">Order Manager</div>
            <div class="card-desc">Track orders, payments & deliveries</div>
        </a>
        <div class="footer">Works on Android, iOS & Desktop</div>
    </div>
</body>
</html>
