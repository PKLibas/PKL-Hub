<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PK LIBAS - Business Tools</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #4a4e8c 0%, #2d2d5a 50%, #1a1a3e 100%);
      min-height: 100vh;
      padding: 20px 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-card {
      background: #f0f2ff;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      color: #2d2d5a;
      letter-spacing: 3px;
    }
    .subtitle {
      text-align: center;
      color: #6b5b95;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 40px;
    }

    .tool-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
    }
    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.15);
      border-color: #667eea;
    }
    .tool-card:active {
      transform: translateY(0);
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .icon-mod { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .icon-calc { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .icon-orders { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

    .tool-info {
      flex: 1;
    }
    .tool-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d2d5a;
      margin-bottom: 4px;
    }
    .tool-desc {
      font-size: 12px;
      color: #888;
    }

    .lock-badge {
      background: #ffebee;
      color: #c62828;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 8px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="main-card">
    <div class="logo">PK LIBAS</div>
    <div class="subtitle">Business Management Tools</div>

    <a href="moderator.html" class="tool-card">
      <div class="tool-icon icon-mod">👤</div>
      <div class="tool-info">
        <div class="tool-title">Moderator Panel <span class="lock-badge">🔒 PASSWORD</span></div>
        <div class="tool-desc">Customer Price Calculator + Image Search</div>
      </div>
    </a>

    <a href="reseller.html" class="tool-card">
      <div class="tool-icon icon-calc">💰</div>
      <div class="tool-info">
        <div class="tool-title">Reseller Calculator</div>
        <div class="tool-desc">Simple price calculator for resellers</div>
      </div>
    </a>

    <a href="orders.html" class="tool-card">
      <div class="tool-icon icon-orders">📦</div>
      <div class="tool-info">
        <div class="tool-title">Order Manager</div>
        <div class="tool-desc">Track orders, payments & deliveries</div>
      </div>
    </a>

    <div class="footer">
      Works on Android, iOS & Desktop
    </div>
  </div>
</body>
</html>
